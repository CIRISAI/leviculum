# cargo-deny configuration.
#
# Leviculum is AGPL-3.0-or-later; its dependency tree is permissively licensed.
# cargo-deny 0.19 denies any license not explicitly allowed, so the set below
# is the union of licenses actually present in the graph (crypto is
# dalek/RustCrypto; no `ring`/OpenSSL, so no custom-license exceptions needed).

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0", # webpki-roots — Mozilla CA-cert bundle data (pulled by upstream TLS crates)
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "bzip2-1.0.6", # libbz2-rs-sys — the bzip2 license (RNS uses bzip2)
]
confidence-threshold = 0.8

# `unescaper` (pulled by serialport) declares `GPL-3.0/MIT` — the deprecated
# `/` OR-syntax, which is not valid SPDX so cargo-deny can't evaluate the OR.
# It is dual-licensed and we take it under MIT; clarify the expression so the
# already-allowed MIT applies.
[[licenses.clarify]]
crate = "unescaper"
expression = "MIT"
license-files = []

[advisories]
# Fail the build on RUSTSEC security advisories; warn on yanked crates.
yanked = "warn"

[bans]
# Transitive ecosystem version splits (bitflags 1/2, rand 0.8/0.9, …) are
# unavoidable and harmless; don't fail on them.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
