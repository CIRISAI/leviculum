# Expected-marginal, non-gating PDR. SF10/CR8 over a mixed SX1262 LNode to
# SX127x RNode pair is a characterized chip interop margin corner at the longest
# packet. Excluded from the 100% PDR lab target. SF10/CR5 is the robust mixed
# chip limit and same chip pairs (bench_single_pair_slow_ca_rnode_only) pass
# SF10/CR8; both stay gating. Runnable for diagnostics. The tier3 gating
# carve-out is the EXPECTED_MARGINAL allowlist in scripts/run-tier3-hw.sh, the
# single source of truth: a failure here is reported and counted but does not
# flip the verdict RED.
profile = "rnode_lnode_pair"

[test]
name = "bench_single_pair_slow_ca"
description = "Single-pair probe throughput (SF10/BW125/CR4/8) with CSMA/CA on"
timeout_secs = 900

[radio]
frequency = 869525000
bandwidth = 125000
sf = 10
cr = 8
txpower = 17
csma_enabled = true

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
serial = true

[[steps]]
action = "sleep"
duration_secs = 120

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 300

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 180
label = "single_pair_slow_ca"
