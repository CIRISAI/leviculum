# Link establishment + channel messaging over LoRa, Python↔Python.
# Uses selftest --mode link to verify bidirectional channel communication.
# Requires two RNode devices at /dev/ttyACM0 and /dev/ttyACM1.
# Build lnsd with: cargo build --release --bin lnsd --features serial
# Build lnstest with: cargo build --release --bin lnstest
#
# Expected-marginal, non-gating: the python relay stack does not recover a lost
# LinkRequest/LRPROOF in-window over slow LoRa (~60% red, vs the rust and interop
# relay variants green). On the EXPECTED_MARGINAL allowlist in
# scripts/run-tier3-hw.sh, the single source of truth: a failure here is reported
# and counted but does not flip the tier3 verdict RED.

profile = "rnode_pair"

[test]
name = "lora_link_python"
description = "Python↔Python link and channel messages over LoRa via selftest"
timeout_secs = 900
rust_log = "leviculum_core::link::channel=debug,leviculum_core::link=debug,leviculum_core::transport=debug,leviculum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "python"
respond_to_probes = true
rnode = true
listen_port = 4242

[nodes.beta]
type = "python"
respond_to_probes = true
rnode = true
listen_port = 4242

[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "wait_for_path"
on = "alpha"
destination = "beta.probe"
timeout_secs = 300

[[steps]]
action = "wait_for_path"
on = "beta"
destination = "alpha.probe"
timeout_secs = 300

[[steps]]
action = "exec"
on = "alpha"
command = "lnstest selftest 127.0.0.1:4242 beta:4242 --mode link --rate 1 --duration 60 --discovery-timeout 300"
expect_exit_code = 0
env = { RUST_LOG = "leviculum_core::link::channel=debug,leviculum_core::link=debug,leviculum_core::transport=debug,leviculum_std::interfaces=debug,info" }
