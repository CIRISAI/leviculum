# Expected-marginal, non-gating PDR. Same SF10/CR8 mixed SX1262 LNode to SX127x
# RNode chip interop margin corner as bench_single_pair_slow_ca (same
# rnode_lnode_pair profile); shares its disposition. On the EXPECTED_MARGINAL
# allowlist in scripts/run-tier3-hw.sh, the single source of truth: a failure
# here is reported and counted but does not flip the verdict RED. Runnable for
# diagnostics.
profile = "rnode_lnode_pair"

[test]
name = "bench_single_pair_slow"
description = "Single-pair probe throughput baseline (SF10/BW125/CR4/8)"
timeout_secs = 900

[radio]
frequency = 869525000
bandwidth = 125000
sf = 10
cr = 8
txpower = 17
csma_enabled = false

[nodes.sender]
type = "rust"
respond_to_probes = true
rnode = true

[nodes.receiver]
type = "rust"
respond_to_probes = true
serial = true

# SF10/BW125/CR4/8: ~6.8s airtime per packet direction.
# Long warmup for announce propagation over slow radio.
[[steps]]
action = "sleep"
duration_secs = 120

[[steps]]
action = "wait_for_path"
on = "sender"
destination = "receiver.probe"
timeout_secs = 300

# Announce settle: wait for retries to complete before measuring
[[steps]]
action = "sleep"
duration_secs = 60

[[steps]]
action = "benchmark"
pairs = [{ from = "sender", to = "receiver.probe" }]
duration_secs = 180
label = "single_pair_slow"
