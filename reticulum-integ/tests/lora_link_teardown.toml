# Link teardown and re-establishment test over LoRa.
#
# First selftest: establish link, exchange bidirectional channel
# messages, explicitly close the link (close packet sent to peer).
#
# 5s sleep: allows close packet to propagate over LoRa. No mandatory
# cooldown — close_link() removes the link synchronously. The sleep
# just ensures the peer receives the close notification.
#
# Second selftest: proves link teardown was clean — a new link
# establishes without stale state interference. Fresh ephemeral keys,
# new link_id, full discovery→link→data→close cycle again.

profile = "rnode_pair"

[test]
name = "lora_link_teardown"
description = "Link close and re-establishment over direct LoRa"
timeout_secs = 420
rust_log = "leviculum_core::transport=debug,leviculum_core::link=debug,leviculum_std::interfaces=debug,info"

[radio]
frequency = 869525000
bandwidth = 62500
sf = 7
cr = 5
txpower = 17

[nodes.alpha]
type = "rust"
respond_to_probes = true
rnode = true
listen_port = 4242

[nodes.beta]
type = "rust"
respond_to_probes = true
rnode = true
listen_port = 4242

[[steps]]
action = "sleep"
duration_secs = 25

[[steps]]
action = "exec"
on = "alpha"
command = "lnstest selftest 127.0.0.1:4242 beta:4242 --mode link --rate 1 --duration 60 --discovery-timeout 120"
expect_exit_code = 0

[[steps]]
action = "sleep"
duration_secs = 5

[[steps]]
action = "exec"
on = "alpha"
command = "lnstest selftest 127.0.0.1:4242 beta:4242 --mode link --rate 1 --duration 60 --discovery-timeout 120"
expect_exit_code = 0
