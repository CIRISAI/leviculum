# `lnstest diag` — collects a self-contained diagnostic bundle from a running
# daemon over the shared-instance RPC, with the identity private key never
# leaking into the output. Mirrors `rnstatus_transport_info.toml`: one Rust
# daemon (alice) and one Python daemon (bob) linked over TCP, so the same
# `lnstest diag` is exercised against both — and both must produce a *populated*
# daemon-view section (Python-rnsd drop-in compat is Priority 1).
#
# Docker-based scenario (the whole reticulum-integ framework is) — runs via
# `cargo test --release -p reticulum-integ executor::tests::lns_diag`.
#
# NOTE on `exec` steps: the executor splits `command` on whitespace and runs
# it via `docker exec` directly — no shell — so no redirection / pipes /
# quoting. Each daemon-view assertion is therefore its own step (one
# `expect_stdout_contains` substring), like rnstatus_transport_info.toml;
# the secret-leak check that needs a pipeline lives in
# scripts/lns_diag_no_secret.sh and is run as `sh /opt/integ-scripts/...`.

[test]
name = "lns_diag"
description = "lnstest diag collects a daemon bundle from Rust and Python daemons without leaking the identity key"
timeout_secs = 90

[nodes.alice]
type = "rust"
respond_to_probes = true

[nodes.bob]
type = "python"
respond_to_probes = true

[links]
alice-bob = "tcp"

# Let the link come up and the probe-destination announces cross both ways.
[[steps]]
action = "sleep"
duration_secs = 8

# --- Rust daemon (alice) ---

# Runs cleanly and emits a bundle.
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "Leviculum diagnostic bundle"

# The RPC round-trip reached the daemon: interface_stats came back populated.
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "daemon uptime:"

# Transport-enabled daemon ⇒ transport id present (proves it's the live view,
# not a degraded section).
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "transport id:"

# Interfaces list rendered from the RPC response.
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "interfaces ("

# Path-table section present.
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "known paths:"

# Bundle is complete (no abort partway through).
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "end of diagnostic bundle"

# No query failed against the Rust daemon.
[[steps]]
action = "exec"
on = "alice"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "active links:"

# Security: the 64 raw bytes of storage/transport_identity (hex-encoded the
# way the bundle renders any byte field) must appear nowhere in the output.
[[steps]]
action = "exec"
on = "alice"
command = "sh /opt/integ-scripts/lns_diag_no_secret.sh"
expect_exit_code = 0
expect_stdout_contains = "ok: identity bytes absent"

# --- Python daemon (bob): drop-in compat — same assertions as alice ---
# `lnstest diag` against a Python `rnsd` must produce a fully populated daemon-view
# section, not just degrade gracefully. (The identity-key-leak property is
# daemon-agnostic — alice's lns_diag_no_secret.sh step + the
# `identity_private_key_never_enters_the_bundle` unit test cover it.)

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "Leviculum diagnostic bundle"

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "Daemon view"

# interface_stats came back populated against rnsd.
[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "daemon uptime:"

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "transport id:"

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "interfaces ("

# path_table query worked against rnsd (with the max_hops=None we now send).
[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "known paths:"

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "active links:"

[[steps]]
action = "exec"
on = "bob"
command = "lnstest diag --config /root/.reticulum"
expect_exit_code = 0
expect_stdout_contains = "end of diagnostic bundle"
