# devices.toml — single source of truth for the embedded hardware
# attached to schneckenschreck.  Used by scripts/run-tier3-hw.sh to log,
# per profile, which boards a LoRa hardware test expects active vs.
# silenced.
#
# NO USB POWER SWITCHING. Every board stays permanently powered on and
# passed through to the VM. RF isolation of non-participating LNodes is
# done by the Rust test (silence_unused_lnode pushes radio_silent over
# serial). The old per-port power cycling correlated with hamster
# hardware-watchdog freezes (2026-06-15) and was removed.
#
# `hub`/`port` and `ppps` are INFORMATIONAL ONLY now (physical topology
# record); nothing reads or acts on them. `vid_pid` and `serial` remain
# the authoritative identity used to recognise each board.

# ----- Device map -----
# Serials are the board identities (formerly the usbhub-helper registry):
#   t-beam-1 = 5896000022, t-beam-2 = 5896004228.

[devices.t-beam-1]
hub      = "1-3.3"      # informational only
port     = 2            # informational only
ppps     = true         # informational only
firmware = "rnode"
vid_pid  = "1a86:55d4"
serial   = "5896000022"

[devices.t-beam-2]
hub      = "1-3"        # informational only
port     = 4            # informational only
ppps     = true         # informational only
firmware = "rnode"
vid_pid  = "1a86:55d4"
serial   = "5896004228"

[devices.pocket-v2]
hub      = "1-3.3.4"    # informational only
port     = 2            # informational only
ppps     = true         # informational only
firmware = "lnode"
vid_pid  = "1209:0002"
serial   = "ABFAB3F1807E459B"

[devices.heltec-v4]
hub      = "1-3.3"      # informational only
port     = 3            # informational only
ppps     = false        # informational only
firmware = "rnode"
vid_pid  = "303a:1001"
serial   = "44:1B:F6:69:77:24"

[devices.t114]
hub      = "1-3.3.4"    # informational only
port     = 4            # informational only
ppps     = true         # informational only
firmware = "lnode"
vid_pid  = "1209:0001"
serial   = "DEC9947DAD9D2869"

# ----- Profiles -----
#
# Each profile lists the device-keys that participate in the test
# (`required` = active) and the keys that do NOT participate (`exclude`).
# Since all boards are always powered, `exclude` no longer cuts power; it
# documents the LNodes the test expects to be silenced (the Rust test
# silences every discovered LNode it does not bind, regardless of this
# list). RNodes need no silencing (dumb modems, no stack), so RNode keys
# in `exclude` are documentation only.
#
# `heltec_v4` is INFORMATIONAL ONLY now (it never cut power even on the
# old tree); both "ignore" and "must-be-on" simply record intent:
#   "ignore"       — heltec-v4 may be on; tests must tolerate it
#   "must-be-on"   — the scenario relies on heltec-v4 being present
#
# `default` is the fall-back assigned to every test that lacks an
# explicit `profile = "..."` field in its descriptor.
#
# Generic profiles are named after the hardware SET a scenario needs,
# not after individual scenarios — scenario TOMLs reference these via
# their top-level `profile = "..."` field.

# Two RNodes, no LNodes (the bulk of the lora_* suite, incl. all
# rnode_proxy scenarios — the proxy sits in front of one of the two).
[profiles.rnode_pair]
required  = ["t-beam-1", "t-beam-2"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "ignore"

# Three RNodes (3-node single-radio topologies).
[profiles.rnode_trio]
required  = ["t-beam-1", "t-beam-2", "heltec-v4"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "must-be-on"

# Four RNodes (4-node and multihop topologies).  The 4th RNode is in
# repair (Lew, 2026-06-12); until it returns and gets a [devices.*]
# entry + a slot in `required`, these scenarios are gated by the
# runner's device-count preflight (structured SCENARIO_SKIPPED), not
# by this profile.
[profiles.rnode_quad]
required  = ["t-beam-1", "t-beam-2", "heltec-v4"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "must-be-on"

# One RNode + one LNode (single-pair benches, LNode probe/split tests).
[profiles.rnode_lnode_pair]
required  = ["t-beam-1", "t114"]
exclude   = ["t-beam-2", "pocket-v2"]
heltec_v4 = "ignore"

# Two RNodes + two LNodes (dual-pair benches).
[profiles.dual_pair_mixed]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "t114"]
exclude   = []
heltec_v4 = "ignore"

# Two LNodes, no RNodes (LNode-firmware-only scenarios).
[profiles.lnode_pair]
required  = ["pocket-v2", "t114"]
exclude   = ["t-beam-1", "t-beam-2"]
heltec_v4 = "ignore"

# LNode-relay topology (planned scenarios; no TOML references this yet).
[profiles.multi_hop_relay]
required  = ["t-beam-1", "t114", "t-beam-2"]
exclude   = ["pocket-v2"]
heltec_v4 = "ignore"

# Everything on (5-board mesh; no TOML references this yet).
[profiles.full_mesh_5node]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "heltec-v4", "t114"]
exclude   = []
heltec_v4 = "must-be-on"

[profiles.default]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "heltec-v4", "t114"]
exclude   = []
heltec_v4 = "must-be-on"
