# devices.toml — single source of truth for the embedded hardware
# attached to schneckenschreck via the hamster USB hub chain.  Used by
# scripts/run-tier3-hw.sh to orchestrate hub-port power around LoRa
# hardware tests.
#
# Topology (since 2026-05-11): RSHTECH tree rooted at 1-3, with
# sub-chips 1-3.3 and 1-3.3.4.  Sockets below use the helper's
# `hub:port` notation; verify with `ssh hamster usbhub-helper status`.
# All hub operations happen on hamster via `ssh hamster usbhub-helper ...`.
#
# `ppps = false` means per-port-power-switching did not actually cut
# power to the device.  Observed for heltec-v4 on the OLD TerraMaster
# tree (no battery installed; mechanism never explained); the helper
# refuses `disable heltec-v4`.  NOT yet re-verified on the RSHTECH
# tree — re-test before relying on heltec power isolation.

# ----- Device map -----
# Serials follow the usbhub-helper registry (authoritative):
#   t-beam-1 = 5896000022, t-beam-2 = 5896004228.

[devices.t-beam-1]
hub      = "1-3.3"
port     = 2
ppps     = true
firmware = "rnode"
vid_pid  = "1a86:55d4"
serial   = "5896000022"

[devices.t-beam-2]
hub      = "1-3"
port     = 4
ppps     = true
firmware = "rnode"
vid_pid  = "1a86:55d4"
serial   = "5896004228"

[devices.pocket-v2]
hub      = "1-3.3.4"
port     = 2
ppps     = true
firmware = "lnode"
vid_pid  = "1209:0002"
serial   = "ABFAB3F1807E459B"

[devices.heltec-v4]
hub      = "1-3.3"
port     = 3
ppps     = false
firmware = "rnode"
vid_pid  = "303a:1001"
serial   = "44:1B:F6:69:77:24"

[devices.t114]
hub      = "1-3.3.4"
port     = 4
ppps     = true
firmware = "lnode"
vid_pid  = "1209:0001"
serial   = "DEC9947DAD9D2869"

# ----- Profiles -----
#
# Each profile lists the device-keys that must be on (`required`) and
# the keys that must be off (`exclude`) for the test.  Devices not in
# either list are left in their pre-test state.  `heltec_v4` is treated
# specially (because it could not be turned off per-port on the old
# tree, see above):
#   "ignore"       — heltec-v4 may stay on; tests must tolerate it
#   "must-be-on"   — heltec-v4 must remain on (no special action needed)
#
# `default` is the all-on fall-back assigned to every test that lacks an
# explicit `profile = "..."` field in its descriptor.
#
# Generic profiles are named after the hardware SET a scenario needs,
# not after individual scenarios — scenario TOMLs reference these via
# their top-level `profile = "..."` field.

# Two RNodes, no LNodes (the bulk of the lora_* suite, incl. all
# rnode_proxy scenarios — the proxy sits in front of one of the two).
[profiles.rnode_pair]
required  = ["t-beam-1", "t-beam-2"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "ignore"

# Three RNodes (3-node single-radio topologies).
[profiles.rnode_trio]
required  = ["t-beam-1", "t-beam-2", "heltec-v4"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "must-be-on"

# Four RNodes (4-node and multihop topologies).  The 4th RNode is in
# repair (Lew, 2026-06-12); until it returns and gets a [devices.*]
# entry + a slot in `required`, these scenarios are gated by the
# runner's device-count preflight (structured SCENARIO_SKIPPED), not
# by this profile.
[profiles.rnode_quad]
required  = ["t-beam-1", "t-beam-2", "heltec-v4"]
exclude   = ["pocket-v2", "t114"]
heltec_v4 = "must-be-on"

# One RNode + one LNode (single-pair benches, LNode probe/split tests).
[profiles.rnode_lnode_pair]
required  = ["t-beam-1", "t114"]
exclude   = ["t-beam-2", "pocket-v2"]
heltec_v4 = "ignore"

# Two RNodes + two LNodes (dual-pair benches).
[profiles.dual_pair_mixed]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "t114"]
exclude   = []
heltec_v4 = "ignore"

# Two LNodes, no RNodes (LNode-firmware-only scenarios).
[profiles.lnode_pair]
required  = ["pocket-v2", "t114"]
exclude   = ["t-beam-1", "t-beam-2"]
heltec_v4 = "ignore"

# LNode-relay topology (planned scenarios; no TOML references this yet).
[profiles.multi_hop_relay]
required  = ["t-beam-1", "t114", "t-beam-2"]
exclude   = ["pocket-v2"]
heltec_v4 = "ignore"

# Everything on (5-board mesh; no TOML references this yet).
[profiles.full_mesh_5node]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "heltec-v4", "t114"]
exclude   = []
heltec_v4 = "must-be-on"

[profiles.default]
required  = ["t-beam-1", "t-beam-2", "pocket-v2", "heltec-v4", "t114"]
exclude   = []
heltec_v4 = "must-be-on"
