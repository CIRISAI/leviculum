# CI pipeline for leviculum.
#
# Secrets required in Woodpecker CI settings (ci.codeberg.org):
#   mail           - email address for git commits
#   codeberg_token - Codeberg access token with repo write permission

clone:
  git:
    image: woodpeckerci/plugin-git

when:
  branch: ${CI_REPO_DEFAULT_BRANCH}
  event: [push, cron]

steps:
  check:
    image: rust:bookworm
    commands:
      - apt-get update && apt-get install -y musl-tools
      - cargo fmt --all -- --check
      - cargo clippy --all -- -D warnings
      - cargo test -p reticulum-core --lib
      - cargo test -p reticulum-std --lib

  interop:
    image: rust:bookworm
    commands:
      # Interop runs the real Python-RNS CLI tools against the Rust daemon.
      # RNS migrated its shared-instance RPC codec to msgpack and its repo is
      # no longer vendored as a submodule, so we install released RNS from PyPI.
      # Python is pinned to 3.10 (the oldest supported runtime — older mobile
      # platforms) via uv, so CI exercises the version floor rather than the
      # image's default interpreter.
      - apt-get update && apt-get install -y musl-tools curl ca-certificates
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - export PATH="$HOME/.local/bin:$PATH"
      - uv python install 3.10
      - uv venv --python 3.10 /opt/rnsvenv
      - VIRTUAL_ENV=/opt/rnsvenv uv pip install rns
      - export PATH="/opt/rnsvenv/bin:$PATH"   # harness spawns `python3`
      - cargo test -p reticulum-std --test rnsd_interop

  build-book:
    image: alpine:edge
    commands:
      - apk add --no-cache mdbook
      - mdbook build docs

  build-man:
    image: alpine:edge
    commands:
      - apk add --no-cache pandoc
      - sh scripts/build-man.sh

  publish:
    image: alpine/git
    environment:
      MAIL:
        from_secret: mail
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - git config --global user.email "$MAIL"
      - git config --global user.name "Woodpecker CI"
      - git clone -b pages https://$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git pages_out || (mkdir pages_out && cd pages_out && git init && git checkout -b pages)
      - cp -ar docs/book/. pages_out/
      - mkdir -p pages_out/man
      - cp -ar target/man/. pages_out/man/
      - cd pages_out
      - git add .
      - if ! git diff --cached --quiet; then git commit -m "Deploy docs ${CI_BUILD_CREATED}" && git push https://$CODEBERG_TOKEN@codeberg.org/$CI_REPO.git pages; fi
