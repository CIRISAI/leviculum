# Nightly build pipeline for leviculum.
#
# Builds two musl-static .deb packages (amd64 + arm64) and uploads
# them to a rolling `nightly` release on Codeberg. Assets are
# overwritten each run, so these download URLs stay stable:
#
#   https://codeberg.org/Lew_Palm/leviculum/releases/download/nightly/leviculum-nightly-amd64.deb
#   https://codeberg.org/Lew_Palm/leviculum/releases/download/nightly/leviculum-nightly-arm64.deb
#
# ONE-TIME SETUP — configure a cron schedule in the Woodpecker web UI
# (Repo → Settings → Crons). YAML cannot declare the cron itself; this
# file only reacts to the `event: cron` trigger. Suggested schedule:
# `0 2 * * *` (02:00 UTC daily).
#
# Authentication uses Woodpecker's CI_NETRC_PASSWORD, injected
# automatically from the codeberg-woodpecker OAuth integration. No
# manual secret in the Woodpecker UI is needed.

when:
  event: cron

# Skip submodule init: vendor/ holds the Python reference Reticulum
# implementation and two firmware reference repos, none of which the
# .deb build touches. Saves bandwidth + clone time on every step.
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: false
      submodules: false

steps:
  build-amd64:
    image: rust:bookworm
    commands:
      - apt-get update && apt-get install -y musl-tools
      - cargo install --locked cargo-deb
      - rustup target add x86_64-unknown-linux-musl
      # Pin the build ID + DEB version once and persist them, so all
      # subsequent steps see exactly the same values (no midnight-UTC
      # drift between build-amd64 and build-arm64). Use $(...)
      # subshells for shell-local values: Woodpecker pre-substitutes
      # brace-style references (CI_COMMIT_SHA etc.) before the shell
      # ever sees the line, and unknown brace-style names expand to
      # empty without warning. Reserve brace form for true Woodpecker
      # variables only — and never write a literal example of brace
      # form in a comment, since the pre-substitutor scans the raw
      # YAML text and chokes on dot-ellipsis placeholders.
      - echo "nightly.$(date -u +%Y%m%d)-${CI_COMMIT_SHA:0:7}" >.build-id
      - echo "$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)~nightly.$(date -u +%Y%m%d).${CI_COMMIT_SHA:0:7}" >.deb-version
      - export LEVICULUM_BUILD_ID="$(cat .build-id)"
      # `cargo clean -p reticulum-cli` avoids a Cargo incremental quirk
      # where repeated builds with the same LEVICULUM_BUILD_ID skip
      # relinking some binaries, leaving them with a stale version
      # string. Fresh containers rarely hit this, but the clean is
      # cheap insurance.
      - cargo clean -p reticulum-cli
      - cargo build --release --target x86_64-unknown-linux-musl --bin lnsd --bin lns --bin lncp
      - cargo deb -p reticulum-cli --target x86_64-unknown-linux-musl --no-build --deb-version "$(cat .deb-version)"

  build-arm64:
    image: rust:bookworm
    commands:
      # cargo-zigbuild uses Zig as the C compiler/linker — the only way
      # to cross-compile to aarch64-musl from an amd64 rust:bookworm
      # image without docker-in-docker or a dedicated arm64 runner.
      # binutils-aarch64-linux-gnu provides aarch64-linux-gnu-strip,
      # used by cargo-deb to strip the aarch64 musl binaries (host
      # strip is amd64-only and rejects aarch64 ELFs).
      - apt-get update && apt-get install -y python3 python3-pip python3-venv xz-utils curl binutils-aarch64-linux-gnu
      - python3 -m venv /opt/zigvenv && /opt/zigvenv/bin/pip install cargo-zigbuild ziglang
      - export PATH="/opt/zigvenv/bin:$PATH"
      - cargo install --locked cargo-deb
      - rustup target add aarch64-unknown-linux-musl
      - export LEVICULUM_BUILD_ID="$(cat .build-id)"
      - cargo clean -p reticulum-cli
      - cargo zigbuild --release --target aarch64-unknown-linux-musl --bin lnsd --bin lns --bin lncp
      - cargo deb -p reticulum-cli --target aarch64-unknown-linux-musl --no-build --deb-version "$(cat .deb-version)"

  package:
    image: debian:bookworm-slim
    commands:
      - bash scripts/collect-nightly-debs.sh

  publish:
    image: debian:bookworm-slim
    commands:
      - apt-get update && apt-get install -y curl jq
      - export LEVICULUM_BUILD_ID="$(cat .build-id)"
      - bash scripts/publish-nightly.sh
