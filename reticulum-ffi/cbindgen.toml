# cbindgen configuration for generating leviculum.h
#
# build.rs runs cbindgen on every build, so the header is regenerated from the
# Rust source each time. It is a build artifact (gitignored), never a committed
# copy that can drift from the symbols. The Rust source is the source of truth.

language = "C"
include_guard = "LEVICULUM_H"
include_version = true
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify manually. */"
documentation = true
documentation_style = "doxy"

[export]
prefix = ""

[fn]
args = "auto"
sort_by = "Name"

[parse]
parse_deps = false
