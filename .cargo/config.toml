# Default all host builds to musl-static. Gives us "runs on any Linux,
# no libc dependency" for free (binary size delta ~1.5% vs glibc-dynamic).
# Requires `musl-tools` on Debian/Ubuntu (provides musl-gcc as linker).
#
# reticulum-ffi is the exception — see the `build-ffi*` aliases below.
# It is the C-API surface (cdylib + staticlib) meant to feel like a
# native Unix library for glibc-host consumers (Python ctypes, C apps
# on stock Debian, `apt install libreticulum-dev`). A musl-cdylib
# dlopen'd into a glibc host gives you two libcs in one process —
# malloc/pthread/TLS state gets corrupted — so the release artefacts
# MUST be built against glibc. During `cargo check --workspace` the
# FFI crate rides the workspace musl default as staticlib-only; that
# is harmless for CI coverage and does not produce a shippable .so.
# The "dropping unsupported crate type `cdylib`" warning during
# workspace checks is therefore EXPECTED — leave it; Cargo has no
# target-conditional crate-type to silence it properly.
[build]
target = "x86_64-unknown-linux-musl"

# Use rust-lld (bundled with rustc) and link-self-contained instead of
# the system musl-gcc wrapper. Reason: Debian Bookworm's musl-tools
# 1.2.3 mishandles -static-pie and produces a dynamic-PIE binary with
# an INTERP entry pointing at /lib/ld-musl-x86_64.so.1 — which doesn't
# exist on a glibc host, so the kernel can't load the interpreter and
# the binary segfaults at startup. rust-lld + self-contained avoids
# the buggy wrapper entirely and produces a real static-PIE binary
# that runs on any Linux. Newer host musl-tools (≥ 1.2.4) work too,
# but we'd rather not depend on the host musl version.
[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes"]

[alias]
# Development workflow
test-core = "test -p reticulum-core --lib"
test-std = "test -p reticulum-std --lib"
test-interop = "test -p reticulum-std --test rnsd_interop"
test-integ = "test -p reticulum-integ -- --nocapture"
lint = "clippy --all"

# C-API library builds — explicitly glibc, overriding the workspace
# musl default. Outputs a real .so/.a under target/<arch>-unknown-linux-gnu/.
# arm64 cross-compile needs `gcc-aarch64-linux-gnu` on Debian/Ubuntu.
build-ffi = "build -p reticulum-ffi --release --target x86_64-unknown-linux-gnu"
build-ffi-arm64 = "build -p reticulum-ffi --release --target aarch64-unknown-linux-gnu"
test-ffi = "test -p reticulum-ffi --target x86_64-unknown-linux-gnu"
# Just the C-API-to-Python-RNS interop suite (spawns scripts/test_daemon.py;
# skips if Python RNS is unavailable), called out like reticulum-std's
# test-interop. The Rust suites also run on the musl default via the rlib.
test-ffi-interop = "test -p reticulum-ffi --test ffi_interop"

# Embedded cross-compilation (requires: rustup target add <target>)
check-nrf52 = "build -p reticulum-core --target thumbv7em-none-eabihf"
check-rp2040 = "build -p reticulum-core --target thumbv6m-none-eabi"
check-esp32s3 = "build -p reticulum-core --target xtensa-esp32s3-none-elf"
check-embedded = "build -p reticulum-core --target thumbv7em-none-eabihf --target thumbv6m-none-eabi"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
